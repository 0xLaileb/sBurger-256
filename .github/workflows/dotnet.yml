# Build, test, pack, and publish sBurger256 to NuGet.org
# Publish job runs only when a version tag is pushed (e.g. v2.0.0)

name: .NET

on:
  push:
    branches: [ "master" ]
    tags:     [ "v*", "[0-9]*" ]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Restore, Build, Test
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # required by Source Link

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore sBurger256.slnx

      - name: Build
        run: dotnet build sBurger256.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test sBurger256.slnx --no-build --configuration Release --verbosity normal

  # ─────────────────────────────────────────────
  # Job 2: Pack (runs on master push AND on tags)
  # ─────────────────────────────────────────────
  pack:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'   # skip on PRs

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore sBurger256.slnx

      - name: Pack
        run: dotnet pack src/sBurger256.csproj --no-restore --configuration Release --output ./nupkg

      - name: Upload .nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkg/*.nupkg
          if-no-files-found: error

      - name: Upload .snupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-symbols
          path: ./nupkg/*.snupkg
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Job 3: Publish to NuGet.org (tags only)
  # ─────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/')   # only on version tags
    environment: publish                         # optional: manual approval gate

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download .nupkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkg

      - name: Download .snupkg artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-symbols
          path: ./nupkg
        continue-on-error: true

      - name: Push to NuGet.org
        run: |
          pkg=$(ls ./nupkg/*.nupkg | head -1)
          dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
